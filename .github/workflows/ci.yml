name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate repo metadata
        run: python tools/check_metadata.py

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Make Maven wrapper executable
        run: chmod +x mvnw
      - name: Run Maven tests
        run: ./mvnw -q test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run Python tests
        env:
          PYTHONPATH: src/Python
        run: python -m unittest discover -s src/Python/tests -p "test_*.py"

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/typescript/package-lock.json
      - run: npm ci
      - run: npm test

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Rust
    steps:
      - uses: actions/checkout@v6
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - run: cargo test

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: src/Go/go.mod
      - run: go test ./...

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Run C# tests
        run: dotnet test src/CSharp/pipeline_services_tests/PipelineServices.Tests.csproj --nologo

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: cmake -S src/Cpp -B src/Cpp/build
      - name: Build C++ examples and tests
        run: cmake --build src/Cpp/build -j
      - name: Run C++ tests
        run: ctest --test-dir src/Cpp/build --output-on-failure
